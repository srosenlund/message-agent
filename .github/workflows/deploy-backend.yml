name: Deploy Backend to Sliplane

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/inboxforge-api:latest,${{ secrets.DOCKER_USERNAME }}/inboxforge-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/inboxforge-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/inboxforge-api:buildcache,mode=max
      
      - name: Deploy to Sliplane
        uses: sliplane/action@v1
        with:
          sliplane-token: ${{ secrets.SLIPLANE_API_TOKEN }}
          app-name: inboxforge-api
          image: ${{ secrets.DOCKER_USERNAME }}/inboxforge-api:${{ github.sha }}
      
      - name: Wait for deployment
        run: sleep 30
      
      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 https://api-message-agent.sliplane.app/api/health || exit 1
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Backend successfully deployed to Sliplane!"
          echo "🔗 API URL: https://api-message-agent.sliplane.app"
          echo "📚 Docs: https://api-message-agent.sliplane.app/docs"

